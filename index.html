<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin DCA Goal Accelerator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
    background: #f7f7f7;
    color: #222;
}

.card {
    background: white;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
}

h1 {
    margin-top: 0;
    margin-bottom: 24px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}

.field {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 6px;
    font-size: 14px;
    color: #666;
}

input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 16px;
}

.summary {
    margin-top: 24px;
    padding: 16px;
    background: #fafafa;
    border-radius: 8px;
    border: 1px solid #eee;
    line-height: 1.8;
}

.summary div {
    margin-bottom: 4px;
}

canvas {
    margin-top: 30px;
}

.footer {
    margin-top: 12px;
    font-size: 13px;
    color: #777;
}
</style>
</head>
<body>

<div class="card">

<h1>₿ Bitcoin DCA Goal Accelerator</h1>

<div class="grid">

<div class="field">
<label>Bitcoin Price ($)</label>
<input id="price" type="number" value="100000">
</div>

<div class="field">
<label>Monthly Contribution ($)</label>
<input id="monthly" type="number" value="1000">
</div>

<div class="field">
<label>Current Stack (BTC)</label>
<input id="stack" type="number" step="0.0001" value="0.25">
</div>

<div class="field">
<label>Goal (BTC)</label>
<input id="goal" type="number" step="0.01" value="1">
</div>

</div>

<div class="summary" id="summary"></div>

<canvas id="chart"></canvas>

<div class="footer">
Assumes the BTC price instantly drops and remains at that level for all future purchases.
</div>

</div>

<script>

const ctx = document.getElementById("chart");
let chart;


// Fallback price used when the API call fails
const DEFAULT_PRICE = 50000;

async function fetchPrice() {
    try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
        if (!res.ok) throw new Error('Network response was not ok');
        const data = await res.json();
        const p = data && data.bitcoin && data.bitcoin.usd;
        if (!p) throw new Error('Price not found in response');
        return p;
    } catch (e) {
        return DEFAULT_PRICE;
    }
}

function monthsToGoal(price, monthly, stack, goal) {
    const btcPerMonth = monthly / price;
    return (goal - stack) / btcPerMonth;
}

function calculate() {

    const price = parseFloat(document.getElementById("price").value);
    const monthly = parseFloat(document.getElementById("monthly").value);
    const stack = parseFloat(document.getElementById("stack").value);
    const goal = parseFloat(document.getElementById("goal").value);

    if (
        !price ||
        !monthly ||
        goal <= stack
    ) {
        return;
    }

    const baseMonths = monthsToGoal(
        price,
        monthly,
        stack,
        goal
    );

    const dip10Months = monthsToGoal(
        price * 0.90,
        monthly,
        stack,
        goal
    );

    const dip20Months = monthsToGoal(
        price * 0.80,
        monthly,
        stack,
        goal
    );

    const dip30Months = monthsToGoal(
        price * 0.70,
        monthly,
        stack,
        goal
    );

    document.getElementById("summary").innerHTML = `
        <div><strong>Current pace:</strong> ${baseMonths.toFixed(1)} months to reach ${goal} BTC</div>
        <div><strong>10% dip:</strong> ${(baseMonths - dip10Months).toFixed(1)} months faster</div>
        <div><strong>20% dip:</strong> ${(baseMonths - dip20Months).toFixed(1)} months faster</div>
        <div><strong>30% dip:</strong> ${(baseMonths - dip30Months).toFixed(1)} months faster</div>
    `;

    const labels = [];

    const noDip = [];
    const dip10 = [];
    const dip20 = [];
    const dip30 = [];
    const goalLine = [];

    const maxMonths = Math.ceil(baseMonths * 1.15);

    for (let month = 0; month <= maxMonths; month++) {

        labels.push(month);

        noDip.push(
            stack +
            month * (monthly / price)
        );

        dip10.push(
            stack +
            month * (monthly / (price * 0.90))
        );

        dip20.push(
            stack +
            month * (monthly / (price * 0.80))
        );

        dip30.push(
            stack +
            month * (monthly / (price * 0.70))
        );

        goalLine.push(goal);
    }

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "No Dip",
                    data: noDip,
                    borderWidth: 3,
                    tension: 0.2
                },
                {
                    label: "10% Dip",
                    data: dip10,
                    borderWidth: 3,
                    tension: 0.2
                },
                {
                    label: "20% Dip",
                    data: dip20,
                    borderWidth: 3,
                    tension: 0.2
                },
                {
                    label: "30% Dip",
                    data: dip30,
                    borderWidth: 3,
                    tension: 0.2
                },
                {
                    label: "Goal",
                    data: goalLine,
                    borderDash: [8, 6],
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0
                }
            ]
        },
        options: {
            responsive: true,
            interaction: {
                mode: "index",
                intersect: false
            },
            plugins: {
                title: {
                    display: true,
                    text: "Bitcoin Stack Growth Over Time"
                },
                legend: {
                    position: "top"
                }
            },
            scales: {
                x: {
                    title: {
                        display: true,
                        text: "Months Into The Future"
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: "Bitcoin Stack (BTC)"
                    }
                }
            }
        }
    });
}

document
    .querySelectorAll("input")
    .forEach(input =>
        input.addEventListener("input", calculate)
    );
// Fetch live price, set the input, then run calculate()
fetchPrice().then(price => {
    const priceInput = document.getElementById('price');
    if (priceInput) priceInput.value = Number(price).toFixed(2);
    calculate();
});

</script>

</body>
</html>
